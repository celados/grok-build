id: skill-id-tool-tests
language: Rust
severity: error
message: Replace name-based tests with id and collision coverage.
rule:
  kind: function_item
  regex: "fn tool_metadata"
fix: |-
  fn tool_metadata() {
      use crate::types::tool_metadata::ToolMetadata;
      let tool = SkillTool;
      let desc = tool.description_template();
      assert!(desc.contains("by its id"));
      assert!(desc.contains("SKILL.md"));
      assert!(!desc.contains("skills %"));
  }

  #[test]
  fn find_skill_by_id_and_collision() {
      let skills = vec![
          make_test_skill("commit", SkillScope::User, "/path/a"),
          make_test_skill("build", SkillScope::Local, "/path/b"),
      ];
      let id = skills[0].short_id();
      assert!(matches!(find_skill(&id, &skills), FindSkillResult::Found(s) if s.name == "commit"));
      assert!(matches!(find_skill("not-an-id", &skills), FindSkillResult::NotFound));

      let collisions = vec![
          make_test_skill("commit", SkillScope::Local, "/path/local"),
          make_test_skill("commit", SkillScope::User, "/path/local"),
      ];
      match find_skill(&collisions[0].short_id(), &collisions) {
          FindSkillResult::Collision(items) => {
              assert!(items.contains(&"commit (/path/local)".to_string()));
              assert_eq!(items.len(), 2);
          }
          other => panic!("Expected Collision, got {other:?}"),
      }
  }

  #[tokio::test]
  async fn skill_file_read_and_menu() {
      let tmp = tempfile::tempdir().unwrap();
      let dir = tmp.path().join("abc");
      std::fs::create_dir_all(dir.join("references")).unwrap();
      std::fs::write(dir.join("SKILL.md"), "---\nname: abc\n---\nbody").unwrap();
      std::fs::write(dir.join("references/guide.md"), "guide text").unwrap();
      let skill = make_test_skill("abc", SkillScope::User, dir.join("SKILL.md").to_str().unwrap());

      let ok = read_skill_file(&skill, "references/guide.md").await;
      assert!(ok.success);
      assert!(ok.skill_message.unwrap().contains("guide text"));

      let miss = read_skill_file(&skill, "references/missing.md").await;
      assert!(!miss.success);
      assert!(
          miss.tool_result.contains("references/guide.md"),
          "miss must list the menu: {}",
          miss.tool_result
      );

      for escape in ["/etc/passwd", "../abc/SKILL.md"] {
          assert!(!read_skill_file(&skill, escape).await.success);
      }

      assert_eq!(
          list_skill_files(&skill, 10).await,
          vec!["references/guide.md".to_string()]
      );
  }
