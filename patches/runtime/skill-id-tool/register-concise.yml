id: skill-id-tool-register-concise
language: Rust
severity: error
message: Register the id-based skill tool in the concise toolset.
rule:
  all:
    - pattern: "vec![$$$ITEMS]"
    - has:
        regex: grok_build::UpdateGoalTool
        stopBy: end
    - inside:
        pattern:
          context: |
            fn grok_build_concise_toolset() -> ToolServerConfig {
              $$$BODY
            }
          selector: function_item
        stopBy: end
fix: |-
  vec![$$$ITEMS (&opencode::OpenCodeSkillTool).into()]
