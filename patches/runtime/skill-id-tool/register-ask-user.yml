id: skill-id-tool-register-ask-user
language: Rust
severity: error
message: Register the id-based skill tool in the ask-user toolset.
rule:
  all:
    - pattern: "vec![$$$ITEMS]"
    - has:
        regex: grok_build::AskUserQuestionTool
        stopBy: end
    - inside:
        pattern:
          context: |
            fn grok_build_ask_user_toolset() -> ToolServerConfig {
              $$$BODY
            }
          selector: function_item
        stopBy: end
fix: |-
  vec![
    (&opencode::OpenCodeSkillTool).into(),
    $$$ITEMS
  ]
