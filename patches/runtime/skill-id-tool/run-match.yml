id: skill-id-tool-run-match
language: Rust
severity: error
message: Handle id success, collision, not-found, and bundled-file reads without name fallback.
rule:
  pattern: |
    let skill = match find_skill(&input.name, &available_skills) {
      $$$ARMS
    };
fix: |-
  let skill = match find_skill(&input.name, &available_skills) {
      FindSkillResult::Found(s) => s.clone(),
      FindSkillResult::Collision(collisions) => {
          return Ok(SkillOutput {
              success: false,
              tool_result: format!(
                  "Skill id '{}' collides -- choose a unique id. Collisions: {}",
                  input.name,
                  collisions.join(", ")
              ),
              skill_name: input.name.clone(),
              skill_message: None,
              error: Some(format!(
                  "Skill id '{}' collides: {}",
                  input.name,
                  collisions.join(", ")
              )),
          });
      }
      FindSkillResult::NotFound => {
          let ids: Vec<String> = available_skills
              .iter()
              .map(|s| format!("{} [{}]", s.short_id(), s.name))
              .collect();
          let available = if ids.is_empty() {
              "none".to_string()
          } else {
              ids.join(", ")
          };
          return Ok(SkillOutput {
              success: false,
              tool_result: format!(
                  "Skill id \"{}\" not found. Available: {}",
                  input.name, available
              ),
              skill_name: input.name.clone(),
              skill_message: None,
              error: Some(format!("Skill id \"{}\" not found", input.name)),
          });
      }
  };
  if let Some(rel) = input.path.as_deref() {
      return Ok(read_skill_file(&skill, rel).await);
  }
