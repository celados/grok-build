id: skill-id-tool-register-plan-readonly
language: Rust
severity: error
message: Register the id-based skill tool in the read-only plan toolset.
rule:
  all:
    - pattern: "vec![$$$ITEMS]"
    - has:
        regex: grok_build::TodoWriteTool
        stopBy: end
    - inside:
        pattern:
          context: |
            fn plan_toolset() -> ToolServerConfig {
              $$$BODY
            }
          selector: function_item
        stopBy: end
fix: |-
  vec![$$$ITEMS (&opencode::OpenCodeSkillTool).into()]
