id: skill-id-tool-input-id
language: Rust
severity: error
message: Present the OpenCode skill argument as id while retaining the Rust field name.
rule:
  pattern:
    context: |
      pub struct SkillInput {
        $$$FIELDS
      }
    selector: struct_item
fix: |-
  pub struct SkillInput {
      /// The short id of the skill to invoke.
      #[serde(rename = "id")]
      #[schemars(description = "The six-character id of the skill to invoke")]
      pub name: String,
      /// Bundled file to read instead of SKILL.md, relative to the skill directory.
      #[serde(default, skip_serializing_if = "Option::is_none")]
      #[schemars(description = "Optional bundled file to read, relative to the skill directory")]
      pub path: Option<String>,
  }
