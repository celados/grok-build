id: skill-id-tool-register-grok-computer
language: Rust
severity: error
message: Register the id-based skill tool in the grok-computer toolset.
rule:
  all:
    - pattern: "vec![$$$ITEMS]"
    - has:
        regex: grok_build::GetTerminalCommandOutputTool
        stopBy: end
    - inside:
        pattern:
          context: |
            fn grok_computer_toolset() -> ToolServerConfig {
              $$$BODY
            }
          selector: function_item
        stopBy: end
fix: |-
  vec![$$$ITEMS (&opencode::OpenCodeSkillTool).into()]
