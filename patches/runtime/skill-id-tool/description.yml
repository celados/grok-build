id: skill-id-tool-description
language: Rust
severity: error
message: Replace the dead skill-list template with the id-only loading protocol.
rule:
  all:
    - kind: const_item
    - has:
        field: name
        regex: ^DESCRIPTION$
        stopBy: end
fix: |-
  const DESCRIPTION: &str = r#"Load a specialized skill by its short id.

  The skill listing renders each entry as:

  - id: <six hex chars>
    description: [<display name>] <what the skill does>
    Use when: <trigger conditions>

  Pass the listed id exactly. The [bracketed] display name is not an id; a name
  will never match.

  Skills are loaded ONLY through this tool. Never use read_file to read SKILL.md,
  never construct a skill path, and never guess an id. If a call fails, pick the
  correct id from the "id [name]" pairs in the error response."#;
