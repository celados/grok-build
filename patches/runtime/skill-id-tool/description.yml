id: skill-id-tool-description
language: Rust
severity: error
message: Replace the dead skill-list template with the id-only loading protocol.
rule:
  all:
    - kind: const_item
    - has:
        field: name
        regex: ^DESCRIPTION$
        stopBy: end
fix: |-
  const DESCRIPTION: &str = r#"Load a specialized skill by its id.

  Every entry in the skill listing supplies one:

  - id: 3f9a21
    description: [example] What the skill does.

  Pass that id. Do not read SKILL.md directly."#;
