id: skill-by-name-regression-test
language: Rust
severity: error
message: Pin that default/workspace grok-build toolsets expose the skill tool.
rule:
  pattern:
    context: |-
      fn test_default_tool_config_has_grok_build_tools() {
          $$$BODY
      }
    selector: function_item
fix: |-
  fn test_default_tool_config_has_grok_build_tools() {
      $$$BODY
  }

  #[test]
  fn test_default_and_workspace_toolsets_include_skill_tool() {
      let skill_id = ToolConfig::from(&opencode::OpenCodeSkillTool).id;
      let default_ts = default_grok_build_toolset();
      let workspace_ts = workspace_grok_build_toolset();
      assert!(
          default_ts.tools.iter().any(|t| t.id == skill_id),
          "default_grok_build_toolset must include skill tool ({skill_id})"
      );
      assert!(
          workspace_ts.tools.iter().any(|t| t.id == skill_id),
          "workspace_grok_build_toolset must include skill tool ({skill_id})"
      );
  }
