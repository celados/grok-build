id: skill-id-listing-overhead
language: Rust
severity: error
message: Account for the id-keyed entry syntax (no path line) in budgeted listings.
rule:
  pattern:
    context: |
      fn overhead(&self) -> usize {
        $$$BODY
      }
    selector: function_item
fix: |-
  fn overhead(&self) -> usize {
      let base = "- id: ".len()
          + self.id.len()
          + "\n  description: [".len()
          + self.name.len()
          + "] ".len()
          + "\n".len();
      if self.when_to_use.is_some() {
          base + "  Use when: ".len() + "\n".len()
      } else {
          base
      }
  }
