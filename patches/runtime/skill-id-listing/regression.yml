id: skill-id-listing-regression
language: Rust
severity: error
message: Add focused coverage for id-bearing markdown listing tiers.
rule:
  kind: function_item
  regex: "fn no_skills_returns_none"
fix: |-
  fn no_skills_returns_none() {
      assert!(announce(&[], 1000).is_none());
  }

  #[test]
  fn markdown_listing_includes_ids_in_full_and_name_only_tiers() {
      let entry = skill("foo", "short");
      let id = entry.short_id();
      let full = announce(&[entry.clone()], 8000).unwrap();
      assert!(full.contains(&format!("- id: {}\n  description: [foo] short", id)));
      assert!(!full.contains("Absolute path:"), "path leaked:\n{full}");

      let long = "x".repeat(10_000);
      let tiny_entry = skill("foo", &long);
      // Header + entry overhead + a sub-MIN_DESC_LENGTH remainder forces tier 3.
      let tiny_budget = listing_header(DEFAULT_SKILL_TOOL_NAME).len() + 40;
      let tiny = announce(&[tiny_entry], tiny_budget).unwrap();
      assert!(tiny.contains(&format!("- id: {} [foo]", id)), "got:\n{tiny}");
      assert!(!tiny.contains("  description:"), "tier 3 must be ids-only:\n{tiny}");
  }
