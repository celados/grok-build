id: skill-id-listing-format
language: Rust
severity: error
message: Render id-keyed entries; the name is a display tag inside the description.
rule:
  pattern:
    context: |
      fn format(&self, func_desc: &str, desc_budget: usize, wtu_budget: usize) -> String {
        $$$BODY
      }
    selector: function_item
fix: |-
  fn format(&self, func_desc: &str, desc_budget: usize, wtu_budget: usize) -> String {
      let desc = truncate_str_with_marker(func_desc, desc_budget);
      if let Some(wtu) = self.when_to_use {
          let wtu = truncate_str_with_marker(strip_leading_trigger_prefix(wtu), wtu_budget);
          format!(
              "- id: {}\n  description: [{}] {}\n  Use when: {}",
              self.id, self.name, desc, wtu
          )
      } else {
          format!("- id: {}\n  description: [{}] {}", self.id, self.name, desc)
      }
  }
