id: skill-id-listing-header
language: Rust
severity: error
message: Define the id-keyed entry shape and forbid every non-id load channel.
rule:
  pattern:
    context: |
      fn listing_header(_tool_name: &str) -> String {
        $$$BODY
      }
    selector: function_item
fix: |-
  fn listing_header(tool_name: &str) -> String {
      format!(
          "The following skills are available, keyed by id. The [bracketed] \
           tag opening each description is the skill's display name, never a \
           valid id. Load a skill ONLY with the {tool_name} tool using its \
           listed id; never use read_file to read SKILL.md and never construct \
           a skill path:\n\n"
      )
  }
