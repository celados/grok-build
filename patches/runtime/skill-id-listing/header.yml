id: skill-id-listing-header
language: Rust
severity: error
message: Point the model at the id channel; the entry shape carries the rest.
rule:
  pattern:
    context: |
      fn listing_header(_tool_name: &str) -> String {
        $$$BODY
      }
    selector: function_item
fix: |-
  fn listing_header(tool_name: &str) -> String {
      format!(
          "The following skills are available. Load one with the {tool_name} \
           tool using its id; do not read SKILL.md directly:\n\n"
      )
  }
