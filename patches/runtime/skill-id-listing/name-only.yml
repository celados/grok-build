id: skill-id-listing-name-only
language: Rust
severity: error
message: Keep the id-first shape when the listing falls back to names-only mode.
rule:
  pattern:
    context: |
      fn name_only(&self) -> String {
        $$$BODY
      }
    selector: function_item
fix: |-
  fn name_only(&self) -> String {
      format!("- id: {} [{}]", self.id, self.name)
  }
