name: AI Agents

# Thin caller — copy this file verbatim into a project's
# .github/workflows/agents.yml. It should never need to change; template
# upgrades happen once in celados/gha and apply to every caller automatically.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    uses: celados/gha/.github/workflows/claude.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    # `secrets: inherit` unreliably resolves org secrets across a
    # cross-repo reusable-workflow call with a `required: true` secret
    # (documented GitHub Actions flakiness) — pass explicitly instead.
    secrets:
      PRISM_API_KEY: ${{ secrets.PRISM_API_KEY }}

  codex:
    uses: celados/gha/.github/workflows/codex.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    secrets:
      PRISM_API_KEY: ${{ secrets.PRISM_API_KEY }}
