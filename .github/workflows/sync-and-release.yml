name: Sync upstream and release

on:
  schedule:
    # Upstream (grokkybara[bot]) pushes "Synced from monorepo" irregularly —
    # roughly once a day, no fixed wall-clock. Poll often; unchanged SHA is a
    # ~15s no-op. Stagger off :00 to avoid the top-of-hour Actions pile-up.
    - cron: "7/15 * * * *"
  workflow_dispatch:
    inputs:
      force_release:
        description: Rebuild even when upstream is unchanged
        required: false
        default: false
        type: boolean

concurrency:
  group: sync-and-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write
      pull-requests: read
      issues: write
    outputs:
      repairable: ${{ steps.maintenance.outputs.repairable }}
      upstream: ${{ steps.plan.outputs.upstream }}
      tracking_issue: ${{ steps.maintenance.outputs.issue }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Upstream build scripts must not inherit a repository mutation
          # credential through git configuration.
          persist-credentials: false
          # The self-hosted runner's work directory is persistent; the default
          # `git clean -ffdx` would wipe the untracked sources/ checkout and its
          # cargo target/ every run, forcing a cold build. prepare_sources in
          # build.sh already handles reusing/refreshing a dirty sources/ tree.
          clean: false

      - name: Resolve upstream and version
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_RELEASE: ${{ inputs.force_release || false }}
        run: |
          upstream="$(git ls-remote https://github.com/xai-org/grok-build.git refs/heads/main | awk '{print $1}')"
          last_upstream="$(jq -r '.upstream' versions.jsonl | tail -1)"
          last_version="$(jq -r '.version' versions.jsonl | tail -1)"
          release=false
          append=false

          if [[ "$upstream" == "$last_upstream" && "$FORCE_RELEASE" != true ]]; then
            if ! gh release view "v$last_version" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              release=true
              version="$last_version"
            else
              version="$last_version"
            fi
          else
            IFS=. read -r major minor patch <<< "$last_version"
            version="$major.$minor.$((patch + 1))"
            release=true
            append=true
          fi

          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "append=$append" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "upstream=$upstream" >> "$GITHUB_OUTPUT"

      - name: Install build prerequisites
        if: steps.plan.outputs.release == 'true'
        env:
          # `brew install` otherwise self-updates its formula index first, which
          # costs minutes on the hosted image and never affects the pinned tools.
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          # The hosted image carries an untrusted AWS tap which otherwise emits
          # an unrelated workflow annotation on every Homebrew invocation.
          brew untap aws/tap >/dev/null 2>&1 || true
          brew install ast-grep dotslash

      # Housekeeping for the persistent runner work directory (checkout uses
      # clean: false so sources/ and its cargo target/ survive between runs).
      - name: Prepare persistent workspace
        if: steps.plan.outputs.release == 'true'
        run: |
          # Steps run in a non-login shell; pin the rustup toolchain onto PATH
          # rather than depending on whatever the runner service captured.
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # A SIGKILLed build (OOM, power loss) escapes build.sh's EXIT trap
          # and leaves patched sources/ dirty, which prepare_sources refuses.
          # On the runner sources/ never holds precious local edits — reset.
          if [ -d sources/.git ]; then
            git -C sources reset --hard --quiet || true
          fi
          # Cargo never GCs target/; cap its growth. A cold rebuild (~23 min
          # on this runner) is the cheaper failure mode vs unbounded disk.
          limit_gb=40
          size_gb="$(du -sg sources/target 2>/dev/null | cut -f1 || echo 0)"
          echo "sources/target is ${size_gb:-0} GB (limit ${limit_gb} GB)"
          if [ "${size_gb:-0}" -gt "$limit_gb" ]; then
            echo "clearing sources/target for a cold rebuild"
            rm -rf sources/target
          fi
          rm -rf dist

      - name: Prepare upstream source
        id: prepare
        if: steps.plan.outputs.release == 'true'
        env:
          UPSTREAM: ${{ steps.plan.outputs.upstream }}
        run: |
          mkdir -p .agent-context
          set -o pipefail
          ./build.sh --prepare --upstream-ref "$UPSTREAM" \
            2>&1 | tee .agent-context/prepare.log

      - name: Build macOS arm64 release
        id: build
        if: steps.plan.outputs.release == 'true'
        env:
          UPSTREAM: ${{ steps.plan.outputs.upstream }}
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          mkdir -p .agent-context
          set -o pipefail
          ./build.sh --upstream-ref "$UPSTREAM" --version "$VERSION" \
            2>&1 | tee .agent-context/build.log

      # Publish before mapping so a main-branch push race cannot strand a finished
      # binary. Mapping still needs to land; push uses rebase+retry for concurrent
      # commits (manual fixes, schedule cadence bumps) during a long build.
      - name: Publish GitHub Release
        if: steps.plan.outputs.release == 'true' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.plan.outputs.version }}
          UPSTREAM: ${{ steps.plan.outputs.upstream }}
        run: |
          gh release create "v$VERSION" "dist/grok-$VERSION-macos-aarch64" \
            --repo "$GITHUB_REPOSITORY" \
            --target main \
            --title "Grok Build $VERSION" \
            --notes "Permission-free macOS arm64 build from xai-org/grok-build@$UPSTREAM."

      - name: Record build mapping
        if: steps.plan.outputs.release == 'true' && steps.plan.outputs.append == 'true' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.plan.outputs.version }}
          UPSTREAM: ${{ steps.plan.outputs.upstream }}
        run: |
          # Checkout credentials were intentionally removed before executing
          # upstream code; restore GitHub auth only on this trusted path.
          gh auth setup-git
          git config user.name "celados-release-bot"
          git config user.email "huodong.work@gmail.com"
          jq -nc \
            --arg version "$VERSION" \
            --arg upstream "$UPSTREAM" \
            --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run "$GITHUB_RUN_ID" \
            '{version:$version,upstream:$upstream,built_at:$built_at,run:$run}' >> versions.jsonl
          git add versions.jsonl
          git commit -m "release: record v$VERSION from upstream ${UPSTREAM:0:7}"
          # Long builds race with other pushes to main; rebase rather than fail.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "failed to push versions.jsonl after retries" >&2
          exit 1

      - name: Open maintenance issue
        id: maintenance
        if: ${{ failure() && github.ref_name == 'main' }}
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.plan.outputs.upstream }}
          PREPARE_OUTCOME: ${{ steps.prepare.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          short_upstream="${UPSTREAM:0:12}"
          title="Automated upstream build failed: $short_upstream"
          marker="<!-- grok-upstream:$UPSTREAM -->"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$UPSTREAM in:body" --json number --jq '.[0].number // ""')"

          if [[ -z "$existing" ]]; then
            existing="$(gh api --method POST "repos/$GITHUB_REPOSITORY/issues" \
              -f title="$title" \
              -f body="$marker

          Inspect run $run_url. Upstream $UPSTREAM may have invalidated a downstream patch contract." \
              --jq .number)"
          else
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "The same upstream revision failed again: $run_url"
          fi

          repairable=false
          if [[ "$PREPARE_OUTCOME" == failure || "$BUILD_OUTCOME" == failure ]]; then
            branch="codex/grok-upstream-$UPSTREAM"
            open_pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$branch" --json number --jq '.[0].number // ""')"
            if [[ -z "$open_pr" ]]; then
              repairable=true
            fi
          fi

          mkdir -p .agent-context
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg run "$run_url" \
            --arg upstream "$UPSTREAM" \
            --arg prepare_outcome "$PREPARE_OUTCOME" \
            --arg build_outcome "$BUILD_OUTCOME" \
            '{repository:$repository,run:$run,upstream:$upstream,prepare_outcome:$prepare_outcome,build_outcome:$build_outcome}' \
            > .agent-context/task.json

          echo "issue=$existing" >> "$GITHUB_OUTPUT"
          echo "repairable=$repairable" >> "$GITHUB_OUTPUT"

      - name: Upload Codex repair context
        if: ${{ failure() && steps.maintenance.outputs.repairable == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: agent-context-${{ steps.plan.outputs.upstream }}
          path: .agent-context
          if-no-files-found: error
          retention-days: 7

  repair:
    needs: release
    if: ${{ always() && needs.release.outputs.repairable == 'true' }}
    uses: celados/gha/.github/workflows/codex.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    with:
      task: |
        Repair the failed xai-org/grok-build upstream integration for upstream
        ${{ needs.release.outputs.upstream }}.

        Inspect .agent-context first, then fetch that exact public upstream
        revision when source context is needed. Keep the change in this
        downstream repository's patch/build layer; never commit generated
        sources. If upstream already provides the behavior of one of our
        conditional patches, remove or disable that downstream patch through
        its recognized satisfied-state contract instead of adapting an obsolete
        seam. Do not change release/version mappings.
      task_key: grok-upstream-${{ needs.release.outputs.upstream }}
      context_artifact: agent-context-${{ needs.release.outputs.upstream }}
      tracking_issue: ${{ needs.release.outputs.tracking_issue }}
    secrets:
      PRISM_API_KEY: ${{ secrets.PRISM_API_KEY }}
